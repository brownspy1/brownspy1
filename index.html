<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>M. Mahadi | Portfolio Terminal</title>
  <meta name="description" content="M. Mahadi's interactive terminal portfolio — Full-stack developer, competitive programmer from Bangladesh.">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
  <style>
    :root {
      --g:  #00ff41;
      --gd: #00cc33;
      --gg: rgba(0,255,65,.6);
      --bg: #000a00;
      --am: #ffb300;
      --rd: #ff3333;
      --cy: #00e5ff;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:#001100; }
    ::-webkit-scrollbar-thumb { background:var(--gd); border-radius:3px; }

    body {
      background:var(--bg);
      color:var(--g);
      font-family:'Share Tech Mono',monospace;
      min-height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      cursor:none;
    }

    /* Matrix */
    #mx { position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:.15;pointer-events:none; }

    /* CRT */
    #crt {
      position:fixed;top:0;left:0;width:100%;height:100%;z-index:1;pointer-events:none;
      background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.13) 2px,rgba(0,0,0,.13) 4px);
      animation:flicker 10s infinite;
    }
    @keyframes flicker { 0%,96%,100%{opacity:1} 97%{opacity:.8} 99%{opacity:.95} }

    /* Cursor */
    #cur {
      position:fixed;width:9px;height:17px;background:var(--g);
      z-index:9999;pointer-events:none;
      animation:blink 1s step-end infinite;
      box-shadow:0 0 8px var(--gg);
      transform:translate(-2px,-2px);
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* Boot */
    #boot {
      position:fixed;inset:0;background:#000;z-index:100;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      font-family:'Share Tech Mono',monospace;
    }
    #blog { width:520px;max-width:92%;line-height:2.1; }
    #blog .ok  { color:#28c840; }
    #blog .err { color:var(--rd); }
    #bpb { width:520px;max-width:92%;height:3px;background:#001800;margin-top:18px;border-radius:2px;overflow:hidden; }
    #bpf { height:100%;width:0;background:var(--g);box-shadow:0 0 8px var(--gg);transition:width .12s; }

    /* Wrapper */
    #wrap { position:relative;z-index:10;width:92%;max-width:800px;display:none;flex-direction:column; }

    /* Title bar */
    #tbar {
      display:flex;align-items:center;gap:7px;padding:8px 16px;
      background:rgba(0,255,65,.05);border:1px solid var(--gd);
      border-bottom:none;border-radius:8px 8px 0 0;
      box-shadow:0 0 20px rgba(0,255,65,.12);
    }
    .dot { width:12px;height:12px;border-radius:50%; }
    .dot.r{background:#ff5f57;box-shadow:0 0 6px #ff5f57;}
    .dot.y{background:#febc2e;box-shadow:0 0 6px #febc2e;}
    .dot.gr{background:#28c840;box-shadow:0 0 6px #28c840;}
    #tbar span { margin-left:auto;font-size:.82rem;color:var(--gd);letter-spacing:2px; }

    /* Terminal body */
    #term {
      background:rgba(0,6,0,.9);border:1px solid var(--gd);
      border-radius:0 0 8px 8px;padding:18px 22px;
      box-shadow:0 0 40px rgba(0,255,65,.18),0 0 80px rgba(0,255,65,.04),inset 0 0 30px rgba(0,255,65,.02);
      height:78vh;max-height:620px;
      display:flex;flex-direction:column;overflow:hidden;
    }

    /* ASCII header */
    /* ASCII header — CSS styled name (no breakable art) */
    #asc-wrap {
      text-align:center;
      margin-bottom:10px;
      opacity:0;
      animation:ascFade .8s ease .2s forwards;
    }
    @keyframes ascFade {
      from{opacity:0;transform:translateY(-6px);}
      to{opacity:1;transform:none;}
    }
    #asc-name {
      font-family:'VT323',monospace;
      font-size:clamp(2rem, 7vw, 3.8rem);
      color:var(--g);
      letter-spacing:clamp(4px,1vw,14px);
      display:block;
      line-height:1;
      animation:glow 3s ease-in-out infinite alternate;
    }
    #asc-sub {
      font-family:'Share Tech Mono',monospace;
      font-size:clamp(.6rem,.9vw,.78rem);
      color:var(--gd);
      letter-spacing:clamp(1px,.5vw,3px);
      margin-top:4px;
      display:block;
      opacity:.8;
    }
    @keyframes glow {
      from{text-shadow:0 0 8px var(--gg);}
      to{text-shadow:0 0 22px var(--gg),0 0 45px rgba(0,255,65,.25);}
    }

    hr.dv { border:none;border-top:1px solid rgba(0,255,65,.2);margin:6px 0; }

    /* Status bar */
    #sbar {
      display:flex;justify-content:space-between;align-items:center;
      font-size:.7rem;color:#3a7a3a;padding:3px 0;letter-spacing:1px;
      flex-wrap:nowrap;gap:8px;overflow:hidden;
    }
    #sbar span { white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
    #sbar .live { color:var(--am); }

    /* Output */
    #out { flex:1;overflow-y:auto;padding-right:4px;scroll-behavior:smooth; }
    #out p { margin:2px 0;line-height:1.65; }
    #out p.ani { animation:fi .18s ease; }
    @keyframes fi { from{opacity:0;transform:translateX(-3px)} to{opacity:1;transform:none} }

    /* Colored spans */
    .cg  { color:var(--g); }
    .cgd { color:var(--gd); }
    .cam { color:var(--am); }
    .ccy { color:var(--cy); }
    .crd { color:var(--rd); }
    .cwh { color:#ccffcc; }
    .cdm { color:#4a8a4a; }
    .bold{ font-weight:700; }
    .ul  { text-decoration:underline; }
    .lnk { color:var(--cy);text-decoration:underline;cursor:pointer; }
    .lnk:hover { color:#fff;text-shadow:0 0 8px var(--cy); }

    /* Input row */
    #irow {
      display:flex;align-items:center;gap:6px;margin-top:10px;
      border-top:1px solid rgba(0,255,65,.13);padding-top:9px;
    }
    #prmpt { color:var(--g);font-size:1.05rem;white-space:nowrap;text-shadow:0 0 6px var(--gg); }
    #inp {
      flex:1;background:transparent;border:none;color:var(--g);
      font-family:'Share Tech Mono',monospace;font-size:1.05rem;
      outline:none;caret-color:var(--g);text-shadow:0 0 4px var(--gg);
    }

    /* Loading spinner text */
    .spin::after {
      content:'';animation:dots 1.2s steps(3,end) infinite;
    }
    @keyframes dots {
      0%{content:'.'} 33%{content:'..'} 66%{content:'...'}
    }

    @media(max-width:600px){
      #term{padding:10px 12px;}
      #wrap{width:99%;}
    }
  </style>
</head>
<body>

<div id="cur"></div>
<canvas id="mx"></canvas>
<div id="crt"></div>

<!-- Boot -->
<div id="boot">
  <div id="blog"></div>
  <div id="bpb"><div id="bpf"></div></div>
</div>

<!-- Terminal -->
<div id="wrap">
  <div id="tbar">
    <div class="dot r"></div>
    <div class="dot y"></div>
    <div class="dot gr"></div>
    <span id="tbar-title">mahadi@portfolio ~ bash</span>
  </div>
  <div id="term">
    <!-- Name header — pure CSS, never breaks -->
    <div id="asc-wrap">
      <span id="asc-name">M. MAHADI</span>
      <span id="asc-sub">Full-Stack Dev &nbsp;|&nbsp; Competitive Programmer &nbsp;|&nbsp; Bangladesh &#127487;&#127465;</span>
    </div>
    <hr class="dv">
    <div id="sbar">
      <span>SESSION:<span id="s-up" class="live"> 00:00:00</span></span>
      <span id="s-time" class="live">⏱ --:--:--</span>
      <span id="s-weather" class="live">🌍 Barisal, BD</span>
      <span id="s-gh" class="live">⭐ GitHub</span>
    </div>
    <hr class="dv">
    <div id="out"></div>
    <div id="irow">
      <span id="prmpt">mahadi@portfolio:~$</span>
      <input id="inp" type="text" autocomplete="off" spellcheck="false" aria-label="Terminal input">
    </div>
  </div>
</div>

<script>
'use strict';

/* ═══════ MATRIX RAIN ═══════ */
(function(){
  const cv=document.getElementById('mx'),ctx=cv.getContext('2d');
  const ch='アイウエオカキクケコサシスセソABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
  const fs=14; let cols,drops;
  function init(){
    cv.width=innerWidth;cv.height=innerHeight;
    cols=Math.floor(cv.width/fs);drops=Array(cols).fill(1);
  }
  function draw(){
    ctx.fillStyle='rgba(0,8,0,.05)';ctx.fillRect(0,0,cv.width,cv.height);
    ctx.fillStyle='#00ff41';ctx.font=fs+'px monospace';
    drops.forEach((y,i)=>{
      ctx.fillText(ch[Math.floor(Math.random()*ch.length)],i*fs,y*fs);
      if(y*fs>cv.height&&Math.random()>.975)drops[i]=0;
      drops[i]++;
    });
  }
  init();addEventListener('resize',init);setInterval(draw,45);
})();

/* ═══════ CURSOR ═══════ */
const CUR=document.getElementById('cur');
addEventListener('mousemove',e=>{CUR.style.left=e.clientX+'px';CUR.style.top=e.clientY+'px';});

/* ═══════ AUDIO ═══════ */
let audioCtx;
function beep(){
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='square';
    o.frequency.setValueAtTime(700,audioCtx.currentTime);
    o.frequency.exponentialRampToValueAtTime(350,audioCtx.currentTime+.03);
    g.gain.setValueAtTime(.045,audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(.001,audioCtx.currentTime+.05);
    o.start();o.stop(audioCtx.currentTime+.06);
  }catch(e){}
}

/* ═══════ CLOCK + UPTIME ═══════ */
const T0=Date.now();
function tick(){
  const now=new Date();
  document.getElementById('s-time').textContent=
    '⏱ '+now.toLocaleTimeString('en-US',{hour12:false});
  const s=Math.floor((Date.now()-T0)/1e3);
  const h=String(Math.floor(s/3600)).padStart(2,'0');
  const m=String(Math.floor(s%3600/60)).padStart(2,'0');
  const sc=String(s%60).padStart(2,'0');
  document.getElementById('s-up').textContent=' '+h+':'+m+':'+sc;
}
setInterval(tick,1e3);tick();

/* ═══════ LIVE WEATHER (JSON API — no HTML response) ═══════ */
let weatherCache=null;
async function loadWeather(){
  try{
    // Use JSON API to avoid wttr.in returning HTML page
    const r=await fetch('https://wttr.in/Barisal?format=j1',{cache:'no-store'});
    const j=await r.json();
    const c=j.current_condition[0];
    const desc=c.weatherDesc[0].value;
    const temp=c.temp_C;
    const feels=c.FeelsLikeC;
    weatherCache={desc,temp,feels,humidity:c.humidity,wind:c.windspeedKmph};
    document.getElementById('s-weather').textContent=`🌤 ${desc} ${temp}°C`;
  }catch(e){
    document.getElementById('s-weather').textContent='🌍 Barisal, BD';
  }
}
loadWeather();

/* ═══════ LIVE GITHUB DATA ═══════ */
let ghUser=null,ghRepos=null,ghEvents=null;
async function loadGitHub(){
  try{
    const [u,r,e]=await Promise.all([
      fetch('https://api.github.com/users/brownspy1').then(x=>x.json()),
      fetch('https://api.github.com/users/brownspy1/repos?sort=updated&per_page=6').then(x=>x.json()),
      fetch('https://api.github.com/users/brownspy1/events/public?per_page=8').then(x=>x.json()),
    ]);
    ghUser=u;ghRepos=Array.isArray(r)?r:[];ghEvents=Array.isArray(e)?e:[];
    document.getElementById('s-gh').textContent=
      '⭐ '+ghUser.public_repos+' repos | 👥 '+ghUser.followers+' followers';
  }catch(e){}
}
loadGitHub();

/* ═══════ BOOT SEQUENCE ═══════ */
const BOOT=[
  {t:'[  OK  ] Initializing kernel...',              c:'ok', d:0  },
  {t:'[  OK  ] Mounting root filesystem...',         c:'ok', d:160},
  {t:'[  OK  ] Loading PortfolioOS v2.0...',         c:'ok', d:300},
  {t:'[  OK  ] Fetching GitHub API...',              c:'ok', d:440},
  {t:'[  OK  ] Fetching live weather...',            c:'ok', d:580},
  {t:'[  OK  ] Authenticating user: mahadi',         c:'ok', d:720},
  {t:'[  OK  ] Decrypting skills.db...',             c:'ok', d:880},
  {t:'[  OK  ] Rendering terminal interface...',     c:'ok', d:1050},
  {t:'[  OK  ] PortfolioOS v2.0 — READY.',           c:'ok', d:1220},
];
const blog=document.getElementById('blog'),bpf=document.getElementById('bpf');
BOOT.forEach((b,i)=>{
  setTimeout(()=>{
    const p=document.createElement('p');
    const s=document.createElement('span');
    s.className=b.c;s.textContent=b.t;
    p.appendChild(s);blog.appendChild(p);
    bpf.style.width=((i+1)/BOOT.length*100)+'%';
  },b.d);
});
setTimeout(()=>{
  document.getElementById('boot').style.display='none';
  const w=document.getElementById('wrap');
  w.style.display='flex';
  startTerminal();
},1900);

/* ═══════ ASCII HEADER ═══════ */
/* ═══════════════════════════════════════════════
   TERMINAL ENGINE — DOM-BASED
═══════════════════════════════════════════════ */
function startTerminal(){
  const OUT=document.getElementById('out');
  const INP=document.getElementById('inp');

  // Welcome message after header fades in
  setTimeout(welcome, 800);

  let hist=[],hIdx=-1;

  document.getElementById('term').addEventListener('click',()=>INP.focus());
  setTimeout(()=>INP.focus(),100);

  INP.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const cmd=INP.value.trim();
      INP.value='';
      if(!cmd)return;
      hist.unshift(cmd);hIdx=-1;
      // Echo the command
      row(sp('mahadi@portfolio:~$ ','cg bold'),sp(cmd,'cwh'));
      beep();
      handle(cmd.toLowerCase());
    } else if(e.key==='ArrowUp'){
      if(hIdx<hist.length-1){hIdx++;INP.value=hist[hIdx];}
      e.preventDefault();
    } else if(e.key==='ArrowDown'){
      hIdx>0?hIdx--:hIdx=-1;
      INP.value=hIdx>=0?hist[hIdx]:'';
      e.preventDefault();
    } else { beep(); }
  });

  /* ─── DOM HELPERS ─── */

  // Create a span with text and classes
  function sp(text,...cls){
    const el=document.createElement('span');
    el.textContent=text;
    cls.forEach(c=>c&&c.split(' ').forEach(x=>x&&el.classList.add(x)));
    return el;
  }

  // Create a clickable link span
  function lnk(text,url){
    const el=document.createElement('span');
    el.textContent=text;
    el.className='lnk';
    el.addEventListener('click',()=>window.open(url,'_blank'));
    return el;
  }

  // Append a row of elements to output
  function row(...items){
    const p=document.createElement('p');
    p.classList.add('ani');
    items.forEach(item=>{
      if(typeof item==='string'){
        p.appendChild(document.createTextNode(item));
      } else if(item instanceof Node){
        p.appendChild(item);
      }
    });
    OUT.appendChild(p);
    OUT.scrollTop=OUT.scrollHeight;
    return p;
  }

  // Empty row
  function br(){row(sp('\u00a0'));}

  // Section header helper
  function hdr(text){
    br();
    row(sp('┌─ ','cam'),sp(text,'cam bold'),sp(' ──────────────────────────────────────────┐','cam'));
  }
  function ftr(){
    row(sp('└──────────────────────────────────────────────────────┘','cam'));
    br();
  }
  function boxLine(...items){
    const p=document.createElement('p');
    p.classList.add('ani');
    p.appendChild(sp('│ ','cam'));
    items.forEach(item=>{
      if(typeof item==='string') p.appendChild(document.createTextNode(item));
      else p.appendChild(item);
    });
    OUT.appendChild(p);OUT.scrollTop=OUT.scrollHeight;
  }

  /* ─── WELCOME ─── */
  function welcome(){
    br();
    row(sp('╔══════════════════════════════════════════════╗','cam bold'));
    row(sp('║','cam bold'),sp('  Welcome to ','cdm'),sp('M. Mahadi\'s','cg bold'),sp(' Portfolio Terminal  ','cdm'),sp('║','cam bold'));
    row(sp('╚══════════════════════════════════════════════╝','cam bold'));
    br();
    row(sp('Type ','cdm'),sp('help','ccy bold'),sp(' to see all available commands.','cdm'));
    row(sp('Tip: ','cdm'),sp('github','ccy bold'),sp(' & ','cdm'),sp('weather','ccy bold'),sp(' show live real-time data 🔴','cdm'));
    br();
  }

  /* ─── COMMAND ROUTER ─── */
  function handle(cmd){
    const [base,...args]=cmd.split(' ');
    switch(base){
      case 'help':      cmdHelp();      break;
      case 'about':     cmdAbout();     break;
      case 'skills':    cmdSkills();    break;
      case 'projects':  cmdProjects();  break;
      case 'education': cmdEducation(); break;
      case 'contact':   cmdContact();   break;
      case 'social':    cmdSocial();    break;
      case 'whoami':    cmdWhoami();    break;
      case 'github':    cmdGitHub();    break;
      case 'repos':     cmdRepos();     break;
      case 'activity':  cmdActivity();  break;
      case 'weather':   cmdWeather();   break;
      case 'neofetch':  cmdNeofetch();  break;
      case 'uptime':    cmdUptime();    break;
      case 'ls':        cmdLs();        break;
      case 'date':      row(sp(new Date().toString(),'cg')); break;
      case 'echo':      row(sp(args.join(' '),'cwh')); break;
      case 'hack':      cmdHack();      break;
      case 'sudo':      cmdSudo();      break;
      case 'clear':     OUT.innerHTML='';welcome(); break;
      case 'exit':      cmdExit();      break;
      case '':          break;
      default:
        row(sp('bash: ','crd'),sp(base,'crd'),sp(': command not found','crd'));
        row(sp('Type ','cdm'),sp('help','ccy'),sp(' for available commands.','cdm'));
    }
  }

  /* ═══════════════════
     COMMANDS
  ═══════════════════ */

  function cmdHelp(){
    br();
    row(sp('┌─ Available Commands ─────────────────────────────────┐','cam bold'));
    const cmds=[
      ['help',      'Show this help menu'],
      ['about',     'About M. Mahadi'],
      ['skills',    'Programming skills & tech stack'],
      ['projects',  'View projects'],
      ['education', 'Educational background'],
      ['contact',   'Contact & links'],
      ['social',    'All social media'],
      ['whoami',    'Current user info'],
      ['github',    '🔴 LIVE — GitHub profile stats'],
      ['repos',     '🔴 LIVE — Latest GitHub repositories'],
      ['activity',  '🔴 LIVE — Recent GitHub activity'],
      ['weather',   '🔴 LIVE — Weather in Barisal, BD'],
      ['neofetch',  'Hacker-style system info'],
      ['uptime',    'Current session uptime'],
      ['ls',        'List sections'],
      ['clear',     'Clear terminal'],
      ['date',      'Show current date/time'],
      ['echo [msg]','Print message'],
      ['hack',      'Fun surprise 😈'],
      ['exit',      'End session'],
    ];
    cmds.forEach(([c,d])=>{
      const p=document.createElement('p');
      p.classList.add('ani');
      p.appendChild(sp('│  ','cam'));
      p.appendChild(sp(c.padEnd(12),'ccy bold'));
      p.appendChild(sp('→ ','cdm'));
      p.appendChild(sp(d,'cdm'));
      OUT.appendChild(p);OUT.scrollTop=OUT.scrollHeight;
    });
    row(sp('└──────────────────────────────────────────────────────┘','cam bold'));
    br();
  }

  function cmdAbout(){
    br();
    row(sp('╔═══ ABOUT ════════════════════════════════════════════╗','cg bold'));
    const lines=[
      ['Name     :','M. Mahadi (Md. Mahadi Hasan)'],
      ['Role     :','Full-Stack Developer & Competitive Programmer'],
      ['Location :','Barisal, Bangladesh 🇧🇩'],
      ['Mission  :','Software Engineer at Google 🚀'],
      ['Learning :','Django • Data Structures • Algorithms'],
      ['Blog     :','motivedupro.blogspot.com'],
      ['Fun Fact :','Great humor — will make you laugh 😂'],
    ];
    lines.forEach(([k,v])=>{
      const p=document.createElement('p');
      p.classList.add('ani');
      p.appendChild(sp('║  ','cg'));
      p.appendChild(sp(k,'cam bold'));
      p.appendChild(document.createTextNode(' '));
      p.appendChild(sp(v,'cwh'));
      OUT.appendChild(p);OUT.scrollTop=OUT.scrollHeight;
    });
    row(sp('╚══════════════════════════════════════════════════════╝','cg bold'));
    br();
  }

  function cmdSkills(){
    br();
    row(sp('[ PROGRAMMING LANGUAGES ]','ccy bold'));
    br();
    const langs=[
      ['Python',    19, 95],
      ['C / C++',   18, 88],
      ['HTML/CSS',  19, 95],
      ['JavaScript',15, 72],
      ['Java',      14, 68],
      ['Django',     9, 45],
    ];
    langs.forEach(([lang,fill,pct])=>{
      const bar='█'.repeat(fill)+'░'.repeat(20-fill);
      const p=document.createElement('p');
      p.classList.add('ani');
      p.appendChild(sp('  ',''));
      p.appendChild(sp(lang.padEnd(14),'cwh'));
      p.appendChild(sp(bar,'cg'));
      p.appendChild(sp(' '+pct+'%','cam'));
      if(pct<50) p.appendChild(sp(' [learning 🔥]','cdm'));
      OUT.appendChild(p);OUT.scrollTop=OUT.scrollHeight;
    });
    br();
    row(sp('[ TOOLS & FRAMEWORKS ]','ccy bold'));
    br();
    const tools=['Git','GitHub','Django','Bootstrap','Linux','VS Code','Photoshop','Illustrator'];
    const p=document.createElement('p');
    p.classList.add('ani');
    p.appendChild(sp('  ',''));
    tools.forEach(t=>{
      p.appendChild(sp('[','cdm'));
      p.appendChild(sp(t,'cg'));
      p.appendChild(sp('] ','cdm'));
    });
    OUT.appendChild(p);OUT.scrollTop=OUT.scrollHeight;
    br();
  }

  function cmdProjects(){
    br();
    row(sp('[ PROJECTS ]','cam bold'));
    br();
    const projects=[

  async function cmdActivity(){
    const wait=row(sp('Fetching recent GitHub activity','cdm'),sp('','cdm spin'));
    if(!ghEvents) await loadGitHub();
    OUT.removeChild(wait);
    br();
    if(!ghEvents||!ghEvents.length){
      row(sp('Error: Could not load activity.','crd'));return;
    }
    row(sp('[ RECENT GITHUB ACTIVITY — LIVE 🔴 ]','ccy bold'));
    br();
    const icons={
      PushEvent:'📤',
      CreateEvent:'✨',
      IssuesEvent:'🔖',
      PullRequestEvent:'🔀',
      WatchEvent:'⭐',
      ForkEvent:'🍴',
      DeleteEvent:'🗑️',
      IssueCommentEvent:'💬',
    };
    ghEvents.slice(0,8).forEach(ev=>{
      const icon=icons[ev.type]||'⚡';
      const repo=ev.repo.name.replace('brownspy1/','');
      const date=new Date(ev.created_at).toLocaleDateString();
      let detail='';
      if(ev.type==='PushEvent'&&ev.payload.commits&&ev.payload.commits.length){
        detail=' — '+ev.payload.commits[0].message.substring(0,45);
      }
      const p=document.createElement('p');
      p.classList.add('ani');
      p.appendChild(sp(icon+' ',''));
      p.appendChild(sp(ev.type.replace('Event',''),'ccy'));
      p.appendChild(sp(' on ','cdm'));
      p.appendChild(lnk(repo,'https://github.com/brownspy1/'+repo));
      if(detail) p.appendChild(sp(detail,'cdm'));
      p.appendChild(sp('  '+date,'cdm'));
      OUT.appendChild(p);OUT.scrollTop=OUT.scrollHeight;
    });
    br();
  }
